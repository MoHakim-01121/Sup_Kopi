{% extends 'base_store.html' %}
{% load socialaccount %}

{% block title %}Masuk — Sup Kopi{% endblock %}

{% block content %}
<div class="row justify-content-center" style="padding: 20px 0 40px;">
    <div class="col-md-5 col-sm-10">

        <!-- Brand mark -->
        <div class="text-center mb-4">
            <div style="font-size:2.2rem; color: var(--co-primary);">
                <i class="fa-solid fa-mug-hot"></i>
            </div>
            <h2 style="font-size:1.5rem; font-weight:700; color:var(--co-primary); letter-spacing:-0.3px; margin:10px 0 4px;">
                Selamat datang
            </h2>
            <p style="font-size:0.875rem; color:var(--co-muted);">Masuk ke akun kafe kamu</p>
        </div>

        <div class="card" style="border-radius:var(--r-md);">
            <div class="card-body" style="padding:36px;">

                <!-- Google login -->
                <a href="{% provider_login_url 'google' %}" class="btn w-100 mb-3"
                   style="border:1.5px solid var(--co-hairline); border-radius:var(--r-xs);
                          padding:11px; font-size:14px; font-weight:500; color:var(--co-ink);
                          background:#fff; display:flex; align-items:center; justify-content:center; gap:10px;">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Masuk dengan Google
                </a>

                <div style="margin: 20px 0; display:flex; align-items:center; gap:12px;">
                    <div style="flex:1; height:1px; background:var(--co-hairline);"></div>
                    <span style="font-size:0.78rem; color:var(--co-muted);">atau dengan email</span>
                    <div style="flex:1; height:1px; background:var(--co-hairline);"></div>
                </div>

                <form method="post" id="loginForm">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control"
                               placeholder="email@kafe.com" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control"
                               placeholder="Masukkan password" required>
                    </div>
                    <button type="submit" id="loginBtn" class="btn btn-dark w-100" style="padding:12px; font-size:0.95rem;">
                        <span id="loginBtnContent">
                            <i class="fa-solid fa-right-to-bracket me-2"></i>Masuk
                        </span>
                        <span id="loginBtnLoading" style="display:none;">
                            <i class="fa-solid fa-circle-notch fa-spin me-2"></i>Memproses...
                        </span>
                    </button>
                    <div class="text-center mt-3">
                        <a href="/accounts/password/reset/"
                           style="font-size:12px; color:var(--co-muted);">
                            Lupa password?
                        </a>
                    </div>
                </form>
                <script>
                document.getElementById('loginForm').addEventListener('submit', function() {
                    var btn = document.getElementById('loginBtn');
                    document.getElementById('loginBtnContent').style.display = 'none';
                    document.getElementById('loginBtnLoading').style.display = 'inline';
                    btn.disabled = true;
                });
                </script>

                <div style="margin: 20px 0; display:flex; align-items:center; gap:12px;">
                    <div style="flex:1; height:1px; background:var(--co-hairline);"></div>
                </div>

                <p class="text-center mb-0" style="font-size:0.875rem; color:var(--co-muted);">
                    Belum punya akun?
                    <a href="/accounts/register/" style="color:var(--co-primary); font-weight:600;">Daftar sebagai Kafe</a>
                </p>

            </div>
        </div>

    </div>
</div>
{% endblock %}
