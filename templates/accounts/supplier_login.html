{% extends 'base_store.html' %}

{% block title %}Masuk — Sup Kopi Supplier{% endblock %}

{% block content %}
<div class="row justify-content-center" style="padding: 40px 0 60px;">
    <div class="col-md-5 col-sm-10">

        <div class="text-center mb-4">
            <div style="font-size:2rem; color:var(--co-primary);">
                <i class="fa-solid fa-mug-hot"></i>
            </div>
            <h2 style="font-size:1.4rem; font-weight:700; color:var(--co-primary); letter-spacing:-0.3px; margin:10px 0 4px;">
                Supplier Login
            </h2>
            <p style="font-size:0.875rem; color:var(--co-muted);">
                Kode OTP akan dikirim ke email kamu setelah login
            </p>
        </div>

        <div class="card" style="border-radius:var(--r-md);">
            <div class="card-body" style="padding:32px;">

                <form method="post" id="supplierLoginForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control"
                               placeholder="Username supplier" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control"
                               placeholder="Password" required>
                    </div>
                    <button type="submit" id="supplierLoginBtn" class="btn btn-dark w-100" style="padding:12px;">
                        <span id="supplierBtnContent">
                            <i class="fa-solid fa-right-to-bracket me-2"></i>Masuk
                        </span>
                        <span id="supplierBtnLoading" style="display:none;">
                            <i class="fa-solid fa-circle-notch fa-spin me-2"></i>Memproses...
                        </span>
                    </button>
                    <div class="text-center mt-3">
                        <a href="/accounts/password/reset/"
                           style="font-size:12px; color:var(--co-muted);">
                            Lupa password?
                        </a>
                    </div>
                </form>
                <script>
                document.getElementById('supplierLoginForm').addEventListener('submit', function() {
                    var btn = document.getElementById('supplierLoginBtn');
                    document.getElementById('supplierBtnContent').style.display = 'none';
                    document.getElementById('supplierBtnLoading').style.display = 'inline';
                    btn.disabled = true;
                });
                </script>

            </div>
        </div>

        <p class="text-center mt-3" style="font-size:12px; color:var(--co-muted);">
            Login kafe?
            <a href="/accounts/login/" style="color:var(--co-primary);">Masuk di sini</a>
        </p>

    </div>
</div>
{% endblock %}
