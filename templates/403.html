<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akses Ditolak — Sup Kopi</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --co-primary:       #17171c;
            --co-stone:         #eeece7;
            --co-body-muted:    #616161;
            --co-primary-hover: #2d2d35;
            --r-sm: 8px;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--co-stone);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .error-number {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 6rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            color: var(--co-primary);
            margin-bottom: 0.75rem;
        }

        h1 {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 1.125rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--co-primary);
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 13px;
            color: var(--co-body-muted);
            margin-bottom: 2rem;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--co-primary);
            color: #fff;
            border-radius: var(--r-sm);
            padding: 9px 18px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            transition: background 0.14s;
        }

        .btn-home:hover { background: var(--co-primary-hover); color: #fff; }
        .btn-home:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div>
        <div class="error-number">403</div>
        <h1>Akses Ditolak</h1>
        <p>Kamu tidak memiliki izin untuk membuka halaman ini.</p>
        <a href="/" class="btn-home">
            <i class="fa-solid fa-arrow-left"></i>
            Kembali ke Beranda
        </a>
    </div>
</body>
</html>
